services:
  embedding:
    image: ${EMBEDDING_IMAGE:-local/embedding-server:latest}
    container_name: embedding
    restart: unless-stopped
    ports:
      - "7997:7997"
    volumes:
      - /mnt/ai-models/embedding:/models:ro
    environment:
      # --- Preload: startup時にロードするモデル (空欄なら起動時ロードなし) ---
      - PRELOAD_EMBEDDING=ruri-v3-310m
      - PRELOAD_RERANKER=ruri-v3-reranker-310m
      # --- Auto-load: /models 配下にあるモデルを初回リクエスト時に自動ロード ---
      - AUTO_LOAD=1
      # --- Idle TTL: 指定秒数アイドルで自動アンロード (0=無効) ---
      - IDLE_TTL=0
      # --- Model directory ---
      - MODEL_DIR=/models
      # --- Device mode: auto|cpu|gpu|cuda ---
      - DEVICE_MODE=${DEVICE_MODE:-auto}
      # Optional JSON kwargs for SentenceTransformer/CrossEncoder.
      # Example: {"model_kwargs":{"attn_implementation":"flash_attention_2","torch_dtype":"float16"}}
      - SENTENCE_TRANSFORMER_KWARGS=${SENTENCE_TRANSFORMER_KWARGS:-}
      - CROSS_ENCODER_KWARGS=${CROSS_ENCODER_KWARGS:-}

