services:
  embedding:
    image: ghcr.io/waigoma/embedding-api-amd:latest
    group_add:
      - video
    devices:
      - /dev/kfd
      - /dev/dri
    ipc: host
    cap_add:
      - SYS_PTRACE
    security_opt:
      - seccomp=unconfined
    environment:
      - DEVICE_MODE=${DEVICE_MODE:-gpu}
      - HSA_OVERRIDE_GFX_VERSION=11.0.0
